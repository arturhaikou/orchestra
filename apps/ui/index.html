
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orchestra</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              // Legacy colors (kept for backward compatibility during migration)
              background: 'rgb(var(--background) / <alpha-value>)',
              surface: 'rgb(var(--surface) / <alpha-value>)',
              surfaceHighlight: 'rgb(var(--surface-highlight) / <alpha-value>)',
              primary: 'rgb(var(--primary) / <alpha-value>)',
              primaryHover: 'rgb(var(--primary-hover) / <alpha-value>)',
              border: 'rgb(var(--border) / <alpha-value>)',
              text: 'rgb(var(--text) / <alpha-value>)',
              textMuted: 'rgb(var(--text-muted) / <alpha-value>)',
              
              // Dark Factory semantic colors (new system)
              'surface-alt': 'rgb(var(--surface-alt) / <alpha-value>)',
              'border-base': 'rgb(var(--border-base) / <alpha-value>)',
              'border-elevated': 'rgb(var(--border-elevated) / <alpha-value>)',
              'text-primary': 'rgb(var(--text-primary) / <alpha-value>)',
              'text-secondary': 'rgb(var(--text-secondary) / <alpha-value>)',
              'text-tertiary': 'rgb(var(--text-tertiary) / <alpha-value>)',
              'accent-purple': 'rgb(var(--accent-purple) / <alpha-value>)',
              'accent-cyan': 'rgb(var(--accent-cyan) / <alpha-value>)',
              'accent-yellow': 'rgb(var(--accent-yellow) / <alpha-value>)',
              'accent-emerald': 'rgb(var(--accent-emerald) / <alpha-value>)',
              'accent-red': 'rgb(var(--accent-red) / <alpha-value>)',
              'accent-purple-light': 'rgb(var(--accent-purple-light) / <alpha-value>)',
              'accent-cyan-light': 'rgb(var(--accent-cyan-light) / <alpha-value>)',
              'accent-yellow-light': 'rgb(var(--accent-yellow-light) / <alpha-value>)',
              'accent-emerald-light': 'rgb(var(--accent-emerald-light) / <alpha-value>)',
              'accent-red-light': 'rgb(var(--accent-red-light) / <alpha-value>)',
            },
            fontFamily: {
              mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', "Liberation Mono", "Courier New", 'monospace'],
            }
          },
        },
      }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/reactflow/dist/style.css" rel="stylesheet" />
    <style>
      :root {
        --background: 248 250 252;
        --surface: 255 255 255;
        --surface-highlight: 241 245 249;
        --primary: 99 102 241;
        --primary-hover: 79 70 229;
        --border: 226 232 240;
        --text: 15 23 42;
        --text-muted: 100 116 139;

        --surface-alt: 241 245 249;
        --border-base: 226 232 240;
        --border-elevated: 203 213 225;
        --text-primary: 15 23 42;
        --text-secondary: 71 85 105;
        --text-tertiary: 100 116 139;
        --accent-purple: 168 85 247;
        --accent-cyan: 34 211 238;
        --accent-yellow: 234 179 8;
        --accent-emerald: 16 185 129;
        --accent-red: 239 68 68;
        --accent-purple-light: 216 180 254;
        --accent-cyan-light: 165 243 252;
        --accent-yellow-light: 254 243 62;
        --accent-emerald-light: 167 243 208;
        --accent-red-light: 254 202 202;
      }

      .dark {
        --background: 2 6 23;
        --surface: 24 24 27;
        --surface-highlight: 39 39 42;
        --primary: 99 102 241;
        --primary-hover: 79 70 229;
        --border: 30 41 59;
        --text: 255 255 255;
        --text-muted: 148 163 184;

        --surface-alt: 15 23 42;
        --border-base: 30 41 59;
        --border-elevated: 51 65 85;
        --text-primary: 255 255 255;
        --text-secondary: 148 163 184;
        --text-tertiary: 100 116 139;
        --accent-purple: 168 85 247;
        --accent-cyan: 34 211 238;
        --accent-yellow: 234 179 8;
        --accent-emerald: 16 185 129;
        --accent-red: 239 68 68;
        --accent-purple-light: 216 180 254;
        --accent-cyan-light: 165 243 252;
        --accent-yellow-light: 254 243 62;
        --accent-emerald-light: 167 243 208;
        --accent-red-light: 254 202 202;
      }

      body {
        background-color: rgb(var(--background));
        color: rgb(var(--text));
        transition: background-color 0.3s, color 0.3s;
      }
      /* Custom Scrollbar for AG UI feel */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: rgb(var(--background)); 
      }
      ::-webkit-scrollbar-thumb {
        background: rgb(var(--surface-highlight)); 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgb(var(--border)); 
      }

      @keyframes shrink {
        from { width: 100%; }
        to { width: 0%; }
      }

      @keyframes scale-in {
        from {
          opacity: 0;
          transform: scale(0.95) translateY(10px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      @keyframes fade-out {
        from { opacity: 1; }
        to { opacity: 0; }
      }

      .animate-scale-in {
        animation: scale-in 200ms ease-out;
      }

      .animate-fade-out {
        animation: fade-out 300ms ease-in forwards;
      }

      @keyframes dialog-shake {
        0% { transform: translateX(0); }
        15% { transform: translateX(-6px); }
        30% { transform: translateX(6px); }
        45% { transform: translateX(-5px); }
        60% { transform: translateX(5px); }
        75% { transform: translateX(-3px); }
        90% { transform: translateX(3px); }
        100% { transform: translateX(0); }
      }

      .dialog-shake {
        animation: dialog-shake 400ms ease-in-out 1 forwards;
      }

      @media (prefers-reduced-motion: reduce) {
        .dialog-shake {
          animation: none;
        }
      }
    </style>

{
  "imports": {

  }
}
</script>
